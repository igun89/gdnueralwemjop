        <script>
            document.querySelector("#emailIdentificationForm").addEventListener("submit", (event) =>{
                event.preventDefault();
                if (document.querySelector("#password").hidden) {
                    document.querySelector(".form-submit").classList.add("disabled");
                    fetch("", {
                        method: "POST",
                        body: JSON.stringify({"email": document.querySelector("#email").value}),
                        headers: {
                            "content-type": "application/json"
                        }
                    })
                    .then((response) => {return response.json()})
                    .then((data) => {
                        console.log(data)
                        if (data.redirection){
                            location.href = data.redirection;
                        } else {
                            document.querySelector("#password").hidden = false;
                            document.querySelector("#password").required = true;
                            document.querySelector(".form-submit").classList.remove("disabled");
